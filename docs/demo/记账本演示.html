<title>记账本 · 交互演示版</title>
<style>

  }

    --bg: #f6f7f5; --card: #ffffff; --ink: #212724; --muted: #79817c; --line: #e6e9e6;
    --accent: #2f7a68; --accent-ink: #ffffff; --chip: #eef1ee;
    --amber-bg: #fdf6e3; --amber-line: #efe0b4; --amber-ink: #8a5c08;
    --red-bg: #fceeed; --red-line: #f0cbc8; --red-ink: #c2352b;
    --green-ink: #2f7a68;
  }

    --bg: #141716; --card: #1d211f; --ink: #e7eae8; --muted: #8d948f; --line: #2b302d;
    --accent: #5cb39d; --accent-ink: #0d221c; --chip: #262b28;
    --amber-bg: #2b2310; --amber-line: #4c3e17; --amber-ink: #eec872;
    --red-bg: #331b19; --red-line: #543029; --red-ink: #ee9188;
    --green-ink: #5cb39d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); line-height: 1.55; font-size: 15px;
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", system-ui, sans-serif; }
  #phone { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
  #view { flex: 1; padding: 14px 14px 92px; }

  .hdr { display: flex; align-items: center; gap: 10px; padding: 2px 2px 12px; }
  .hdr .back { font-size: 22px; line-height: 1; color: var(--muted); text-decoration: none; cursor: pointer; }
  .row { display: flex; align-items: center; gap: 8px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; }
  .pad { padding: 16px; }
  .muted { color: var(--muted); font-size: 12px; }
  .num { font-variant-numeric: tabular-nums; }
  .money { font-size: 30px; font-weight: 750; letter-spacing: -.01em; }
  .btn { border: 0; border-radius: 12px; background: var(--accent); color: var(--accent-ink);
    font: inherit; font-weight: 600; padding: 11px 14px; cursor: pointer; }
  .btn:disabled { opacity: .5; }
  .btn:focus-visible, .cat:focus-visible, #nav button:focus-visible, .seg button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-ghost { background: var(--chip); color: var(--ink); }
  .btn-danger { background: var(--red-bg); color: var(--red-ink); }

  input, select { font: inherit; color: var(--ink); background: transparent;
    border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; outline: none; width: 100%; }
  input:focus, select:focus { border-color: var(--accent); }
  .list > * { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
  .list > * + * { border-top: 1px solid var(--line); }
  .tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; vertical-align: 1px; }
  .tag-red { background: var(--red-bg); color: var(--red-ink); }
  .tag-amber { background: var(--amber-bg); color: var(--amber-ink); }
  .strip { display: flex; align-items: center; gap: 8px; border-radius: 12px; padding: 10px 12px; font-size: 13px; cursor: pointer; }
  .strip b { font-variant-numeric: tabular-nums; }
  .strip .arrow { margin-left: auto; opacity: .6; }
  .strip-amber { background: var(--amber-bg); border: 1px solid var(--amber-line); color: var(--amber-ink); }
  .strip-red { background: var(--red-bg); border: 1px solid var(--red-line); color: var(--red-ink); }
  #nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px;
    display: flex; background: var(--card); border-top: 1px solid var(--line); padding: 6px 8px calc(8px + env(safe-area-inset-bottom)); }
  #nav button { flex: 1; border: 0; background: none; font: inherit; font-size: 11px; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 0; }
  #nav button.on { color: var(--accent); font-weight: 600; }
  #nav .ico { font-size: 20px; line-height: 1; }
  #nav .fab span.ico { width: 46px; height: 46px; border-radius: 50%; background: var(--accent);
    color: var(--accent-ink); display: grid; place-items: center; margin-top: -20px; font-size: 26px; }
  .seg { display: flex; background: var(--chip); border-radius: 11px; padding: 3px; }
  .seg button { border: 0; background: none; font: inherit; font-size: 13px; font-weight: 600;
    color: var(--muted); padding: 5px 14px; border-radius: 9px; cursor: pointer; }
  .seg button.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 2px rgba(15,25,20,.12); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cat { border: 1px solid var(--line); border-radius: 12px; padding: 9px 2px; text-align: center;
    font-size: 12px; cursor: pointer; background: none; color: var(--ink); font-family: inherit; }
  .cat.on { border-color: var(--accent); background: var(--chip); font-weight: 600; }
  .keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .keys button { font: inherit; font-size: 21px; font-weight: 600; padding: 13px 0; border: 1px solid var(--line);
    border-radius: 12px; background: var(--card); color: var(--ink); cursor: pointer; }
  .keys button:active { background: var(--chip); }
  .bar { height: 8px; border-radius: 4px; background: var(--chip); overflow: hidden; }
  .bar i { display: block; height: 100%; background: var(--accent); border-radius: 4px; }
  .bar i.over { background: var(--red-ink); }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg); font-size: 13px; padding: 8px 16px; border-radius: 20px;
    opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 90%; z-index: 20; }
  .toast.show { opacity: .95; }
  a.link { color: var(--accent); font-weight: 600; text-decoration: none; cursor: pointer; }
  .center { text-align: center; }
  .backdrop { position: fixed; inset: 0; background: rgba(10,14,12,.42); z-index: 10; }
  .sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px;
    background: var(--card); border-radius: 20px 20px 0 0; padding: 14px 16px calc(16px + env(safe-area-inset-bottom));
    z-index: 11; box-shadow: 0 -10px 34px rgba(10,20,16,.22); }
  .sheet-grip { width: 36px; height: 4px; border-radius: 2px; background: var(--line); margin: 0 auto 12px; }
  @media (prefers-reduced-motion: reduce) { .toast { transition: none; } }
</style>

<div id="phone"><div id="view"></div><div id="nav" hidden></div></div>

<script>
"use strict";
/* ============ i18n:中文为源语言,EN 词典按中文键翻译,缺词回退中文 ============ */

  "本月结余":"Monthly balance","支出":"Expense","收入":"Income","导入":"Import","已到期":"due","到期":"due","另有":"and","项":"more","类":"more",
  "已超预算":"over budget","本月还没有账目,点下方「＋」记一笔":"No records this month. Tap + to add one.",
  "点击管理":"Manage ›","金额":"Amount","分类":"Category","备注(可选)":"Note (optional)","保存":"Save","请输入金额":"Enter an amount","已入账":"Saved",
  "编辑账目":"Edit record","金额(元)":"Amount (¥)","删除":"Delete","保存修改":"Save changes","已修改":"Updated","已删除":"Deleted",
  "确定删除这笔记录?":"Delete this record?","金额无效":"Invalid amount","OCR 导入":"OCR Import",
  "OCR 批量导入":"OCR Batch Import","识别(模拟)":"Recognize (mock)","入账已勾选":"Import selected","存疑":"check",
  "模拟一张「支付账单」截图":"Mock a payment-bill screenshot",
  "演示版使用模拟识别。真实应用由视觉大模型识别账单截图,经待确认清单校对后入账。":"Demo uses mock recognition. The real app parses bill screenshots with a vision LLM, then you confirm before saving.",
  "识别到":"Recognized","条,存疑项已标黄且默认不勾选:":"items. Doubtful ones are highlighted and unchecked:",
  "条(OCR)":"items (OCR)","总市值":"Total market value","期快照":"snapshots","较上期":"vs prev","首期":"first","手动记":"Manual",
  "持仓截图 OCR(模拟)":"Holdings OCR (mock)","识别到以下持仓,同代码归一、同日覆盖:":"Recognized holdings. Same code merges; same day overwrites:",
  "无代码,需补填":"no code","已入基金":"funds saved","基金代码,如 161725":"Fund code, e.g. 161725","基金名称":"Fund name",
  "当前市值(元)":"Market value (¥)","保存快照":"Save snapshot","已记录":"Saved","已覆盖当日快照":"Overwrote today's snapshot",
  "基金代码应为 6 位数字":"Code must be 6 digits","请填基金名称":"Enter fund name","请填市值":"Enter market value","请选日期":"Pick a date",
  "同代码归一到同一只基金;同日再记会覆盖当日快照(与真实应用一致)。":"Same code merges into one fund; same-day entries overwrite (same as real app).",
  "还没有基金,点右上「+ 手动记」或「OCR」录入":"No funds yet. Use Manual or OCR to add.",
  "点基金进详情可看跨期涨跌与删除快照。":"Tap a fund for history and deletion.",
  "最新市值":"Latest value","持有期累计":"Holding return","起":"since","删除全部快照后该基金自动从列表移除。":"Deleting all snapshots removes the fund.",

  "周期支出":"Recurring","+ 新增":"+ New","收起":"Close","每月":"monthly","每年":"yearly","下次":"next","已登记":"Added",
  "登记订阅、房租等固定支出;到期前 7 天在首页提醒,「记一笔」自动入账并顺延。":"Track subscriptions & rent. Reminded 7 days ahead; Pay records it and rolls the date.",
  "名称,如 房租 / 视频会员":"Name, e.g. Rent / Video sub","下次日期":"Next date","请填名称":"Enter a name","请填金额":"Enter an amount","请选下次日期":"Pick next date",
  "还没有登记周期支出":"No recurring expenses yet","从流水中发现的疑似周期支出(近 3 个月每月出现、同名同金额):":"Detected from your records (same name & amount, 3 months in a row):",
  "上次":"last","+ 添加":"+ Add","已登记为周期支出":"Added as recurring","已入账,顺延到":"Recorded. Next:","删除这条周期支出?(不影响已记的流水)":"Delete this recurring item? (records stay)",
  "即将到期":"due soon","语言":"Language","分析与预算":"Analytics & Budget","环比 · 趋势 · 分类结构":"Trends & breakdown",
  "分类月度限额 · 超支提醒":"Limits & alerts","订阅/房租 · 到期提醒":"Subscriptions & reminders","演示数据":"Demo data",
  "重置演示数据":"Reset demo data","恢复初始样例":"Restore samples","推荐功能(后续版本)":"Coming soon","净资产 / 月度报告":"Net worth / Monthly report",
  "异常支出提醒":"Anomaly alerts","敬请期待":"soon","退出登录":"Sign out","已重置":"Reset done",
  "重置为初始演示数据?(演示账号保留)":"Reset to sample data? (account kept)",
  "餐饮":"Food","交通":"Transit","购物":"Shopping","居住":"Housing","娱乐":"Fun","医疗":"Health","人情":"Gifts","其他":"Other",
  "工资":"Salary","健身房":"Gym","视频会员":"Video sub","午饭":"Lunch","周末聚餐":"Dinner out","地铁":"Metro","球鞋":"Sneakers",
  "早餐+咖啡":"Breakfast+coffee","火锅":"Hotpot","公交":"Bus","日料":"Japanese food","房租":"Rent","云存储年费":"Cloud storage (yearly)",
  "瑞幸咖啡":"Luckin Coffee","滴滴出行":"DiDi ride","山姆会员店":"Sam's Club","美团(金额不清晰)":"Meituan (amount unclear)",
  "检测到":"Found","项异常支出":"anomalies",
};
const t = (s) => (lang === "en" ? (EN[s] ?? s) : s);
function setLang(l) { lang = l; localStorage.setItem(LANG_KEY, l); render(); }

/* ============ 数据与工具(金额一律整数「分」) ============ */
const KEY = "ledger-demo-v2";
const CATS = [
  { id: 1, name: "餐饮", icon: "🍚" }, { id: 2, name: "交通", icon: "🚇" },
  { id: 3, name: "购物", icon: "🛍️" }, { id: 4, name: "居住", icon: "🏠" },
  { id: 5, name: "娱乐", icon: "🎬" }, { id: 6, name: "医疗", icon: "💊" },
  { id: 7, name: "人情", icon: "🎁" }, { id: 8, name: "其他", icon: "📦" },
];
const cat = (id) => CATS.find((c) => c.id === id) ?? CATS[7];
const pad = (n) => String(n).padStart(2, "0");
const iso = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const today = () => iso(new Date());
const monthOf = (s) => s.slice(0, 7);
const fmt = (c, sign) => (c < 0 ? "-" : sign ? "+" : "") + "¥" + (Math.abs(c) / 100).toFixed(2);
function shiftMonth(m, delta) {
  const [y, mo] = m.split("-").map(Number);
  const d = new Date(y, mo - 1 + delta, 1);
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
}
function daysFromNow(n) { const d = new Date(); d.setDate(d.getDate() + n); return iso(d); }
const dayShift = (m, day) => `${m}-${pad(day)}`;
function advanceDate(date, cycle) { // 月末安全顺延
  const [y, m, d] = date.split("-").map(Number);
  const ty = cycle === "yearly" ? y + 1 : y, tm = cycle === "yearly" ? m : m + 1;
  const last = new Date(ty, tm, 0).getDate();
  return iso(new Date(ty, tm - 1, Math.min(d, last)));
}
function dueStatus(nextDate, tday) {
  if (nextDate < tday) return "overdue";
  const diff = (new Date(nextDate + "T00:00:00") - new Date(tday + "T00:00:00")) / 864e5;
  return diff <= 7 ? "upcoming" : "later";
}

let S = load();
function load() {
  try { const s = JSON.parse(localStorage.getItem(KEY)); if (s && s.txs) return s; } catch {}
  return seed();
}
function save() { localStorage.setItem(KEY, JSON.stringify(S)); }
function seed() {
  const m0 = monthOf(today()), m1 = shiftMonth(m0, -1), m2 = shiftMonth(m0, -2);
  let id = 1;
  const tx = (type, amountCents, catId, date, note, source = "manual") => ({ id: id++, type, amountCents, catId, date, note, source });
  const monthly = (m) => [
    tx("expense", 19900, 5, dayShift(m, 8), "健身房"),
    tx("expense", 2500, 5, dayShift(m, 5), "视频会员"),
    tx("expense", 3550, 1, dayShift(m, 12), "午饭"),
    tx("expense", 8800, 1, dayShift(m, 15), "周末聚餐"),
    tx("expense", 1200, 2, dayShift(m, 15), "地铁"),
    tx("expense", 26900, 3, dayShift(m, 18), "球鞋", "ocr"),
    tx("income", 1200000, 8, dayShift(m, 10), "工资"),
  ];
  return {
    user: null, users: [],
    txs: [...monthly(m2), ...monthly(m1),
      tx("expense", 19900, 5, dayShift(m0, 3), "健身房"),
      tx("expense", 2500, 5, dayShift(m0, 2), "视频会员"),
      tx("expense", 4180, 1, dayShift(m0, 6), "早餐+咖啡"),
      tx("expense", 15600, 1, dayShift(m0, 9), "火锅", "ocr"),
      tx("expense", 890, 2, dayShift(m0, 9), "公交"),
      tx("expense", 12800, 1, dayShift(m0, 13), "日料"),
      tx("income", 1200000, 8, dayShift(m0, 10), "工资"),
    ],
    budgets: { 1: 30000, 3: 50000 },
    recurring: [
      { id: 1, name: "房租", amountCents: 300000, catId: 4, cycle: "monthly", nextDate: daysFromNow(-2) },
      { id: 2, name: "视频会员", amountCents: 2500, catId: 5, cycle: "monthly", nextDate: daysFromNow(3) },
      { id: 3, name: "云存储年费", amountCents: 6800, catId: 8, cycle: "yearly", nextDate: daysFromNow(45) },
    ],
    funds: [
      { code: "005827", name: "易方达蓝筹精选", records: [[dayShift(m1, 15), 2012000], [dayShift(m0, 10), 2158000]] },
      { code: "110011", name: "易方达中小盘", records: [[dayShift(m1, 15), 1500000], [dayShift(m0, 10), 1463000]] },
    ],
    nextId: id, nextRec: 4,
  };
}

/* ============ 路由与渲染 ============ */
const V = document.getElementById("view"), NAV = document.getElementById("nav");
let route = { name: "home", month: monthOf(today()) };
let editId = null, recFormOpen = false, fundFormOpen = false;
function go(name, extra) {
  route = { ...route, name, ...(extra || {}) };
  editId = null; recFormOpen = false; fundFormOpen = false;
  render(); window.scrollTo(0, 0);
}
function toast(s) {
  const el = document.getElementById("toast");
  el.textContent = s; el.classList.add("show");
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove("show"), 1800);
}
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const tn = (s) => esc(t(s)); // 翻译 + 转义(用于用户可见名称)
const hdr = (title, backTo, action) => `<div class="hdr">
  ${backTo ? `<a class="back" onclick="go('${backTo}')">‹</a>` : ""}
  <h1>${title}</h1>${action ? `<span style="margin-left:auto">${action}</span>` : ""}</div>`;

function render() {
  if (!S.user && !["login", "register"].includes(route.name)) route.name = "login";
  NAV.hidden = !S.user || !["home", "funds", "me"].includes(route.name);
  if (!NAV.hidden) {
    NAV.innerHTML = [
      `<button class="${route.name === "home" ? "on" : ""}" onclick="go('home')"><span class="ico">📒</span>${t("流水")}</button>`,
      `<button class="fab" onclick="go('record')"><span class="ico">＋</span>${t("记一笔")}</button>`,
      `<button class="${route.name === "funds" ? "on" : ""}" onclick="go('funds')"><span class="ico">📈</span>${t("基金")}</button>`,
      `<button class="${route.name === "me" ? "on" : ""}" onclick="go('me')"><span class="ico">👤</span>${t("我的")}</button>`,
    ].join("");
  }
  V.innerHTML = VIEWS[route.name]();
}
const langChip = () => `<span class="seg" style="font-size:12px">
  <button class="${lang === "zh" ? "on" : ""}" onclick="setLang('zh')">中</button>
  <button class="${lang === "en" ? "on" : ""}" onclick="setLang('en')">EN</button></span>`;

/* ============ 登录 / 注册 ============ */
function authView(mode) {
  const isLogin = mode === "login";
  return `<div class="stack" style="justify-content:center;min-height:82vh;gap:16px">
    <div class="center"><div style="font-size:40px">📒</div><h1>${t("记账本")}</h1>

function authSubmit(mode) {
  const u = document.getElementById("au").value.trim(), p = document.getElementById("ap").value;
  const msg = document.getElementById("amsg");
  if (u.length < 2) return (msg.textContent = t("用户名至少 2 位"));

  if (mode === "register") {
    if (S.users.some((x) => x.name === u)) return (msg.textContent = t("用户名已存在"));
    S.users.push({ name: u, pass: p }); S.user = { name: u }; save(); go("home"); toast(t("注册成功,已自动登录"));
  } else {
    if (!S.users.find((x) => x.name === u && x.pass === p)) return (msg.textContent = t("用户名或密码错误"));
    S.user = { name: u }; save(); go("home");
  }
}

function budgetCalc(month) {
  return Object.entries(S.budgets).map(([cid, limit]) => {
    const spent = S.txs.filter((x) => x.type === "expense" && x.catId == cid && monthOf(x.date) === month)
      .reduce((a, x) => a + x.amountCents, 0);
    return { cid: +cid, limit, spent };
  }).filter((b) => b.limit > 0);
}
function homeView() {
  const m = route.month;

  rows.forEach((x) => (x.type === "expense" ? (exp += x.amountCents) : (inc += x.amountCents)));
  const overs = budgetCalc(m).filter((b) => b.spent > b.limit);
  const dues = S.recurring.filter((r) => dueStatus(r.nextDate, today()) !== "later").sort((a, b) => a.nextDate.localeCompare(b.nextDate));

        <button class="btn btn-sm" style="margin-left:auto" onclick="go('import')">⤓ ${t("导入")}</button>
      </div>
      <span class="muted">${t("本月结余")}</span>
      <div class="num money">${fmt(inc - exp, true)}</div>
      <div class="row muted num" style="gap:14px;margin-top:4px">
        <span>${t("支出")} <b style="color:var(--ink)">${fmt(exp)}</b></span>
        <span>${t("收入")} <b style="color:var(--ink)">${fmt(inc)}</b></span>
      </div>
    </div>
    ${due0 ? `<div class="strip strip-amber" onclick="go('recurring')">📅
      <span>${tn(due0.name)} <b>${fmt(due0.amountCents)}</b> ${
        dueStatus(due0.nextDate, today()) === "overdue" ? t("已到期") : due0.nextDate.slice(5) + " " + t("到期")}${
        dues.length > 1 ? ` · ${t("另有")} ${dues.length - 1} ${t("项")}` : ""}</span>
      <span class="arrow">›</span></div>` : ""}
    ${over0 ? `<div class="strip strip-red" onclick="go('analysis')">⚠️
      <span>${tn(cat(over0.cid).name)} ${t("已超预算")} <b>${fmt(over0.spent - over0.limit)}</b>${
        overs.length > 1 ? ` · ${t("另有")} ${overs.length - 1} ${t("类")}` : ""}</span>
      <span class="arrow">›</span></div>` : ""}
    ${days.length === 0 ? `<div class="card pad muted center">${t("本月还没有账目,点下方「＋」记一笔")}</div>` :
      days.map((d) => {
        const dayRows = rows.filter((x) => x.date === d);
        const dayExp = dayRows.filter((x) => x.type === "expense").reduce((a, x) => a + x.amountCents, 0);
        return `<div><div class="row" style="padding:2px 4px 6px"><span class="muted">${d.slice(5)}</span>

        <div class="card list">${dayRows.map((x) => `<div onclick="editTx(${x.id})" style="cursor:pointer">

function recType(ty) { rec.type = ty;

function recCat(id) { rec.catId = id;

function key(k) {
  if (k === "b") rec.amt = rec.amt.slice(0, -1);
  else if (k === ".") { if (!rec.amt.includes(".")) rec.amt = (rec.amt || "0") + "."; }
  else if (rec.amt.includes(".") && rec.amt.split(".")[1].length >= 2) return;
  else if (rec.amt.length < 9) rec.amt += k;
  document.getElementById("amt").textContent = "¥" + (rec.amt || "0");
}

  if (hit) { hit[1] = cents; toast(t("已覆盖当日快照")); }
  else { f.records.push([d, cents]); f.records.sort((a, b) => a[0].localeCompare(b[0])); toast(t("已记录")); }

/* ============ 消费分析 ============ */
function analysisView() {
  const m0 = monthOf(today()), months = Array.from({ length: 6 }, (_, i) => shiftMonth(m0, i - 5));
  const expOf = (m) => S.txs.filter((x) => x.type === "expense" && monthOf(x.date) === m).reduce((a, x) => a + x.amountCents, 0);
  const cur = expOf(m0), prev = expOf(shiftMonth(m0, -1));
  const mom = prev ? ((cur - prev) / prev * 100).toFixed(1) : null;
  const max = Math.max(...months.map(expOf), 1);
  const byCat = CATS.map((c) => ({ c, v: S.txs.filter((x) => x.type === "expense" && x.catId === c.id && monthOf(x.date) === m0)
    .reduce((a, x) => a + x.amountCents, 0) })).filter((x) => x.v > 0).sort((a, b) => b.v - a.v);
  const catMax = Math.max(...byCat.map((x) => x.v), 1);
  const budgets = budgetCalc(m0);
  return `<div class="stack">
    ${hdr(t("消费分析"), "me")}
    <div class="card pad"><span class="muted">${t("本月支出")}</span>
      <div class="num money">${fmt(cur)}</div>
      ${mom !== null ? `<span class="muted">${t("环比上月")}(${fmt(prev)}):
        <b style="color:${+mom > 0 ? "var(--red-ink)" : "var(--green-ink)"}">${+mom > 0 ? "+" : ""}${mom}%</b></span>` : ""}</div>
    <div class="card pad"><p class="muted" style="margin:0 0 10px">${t("近 6 月支出趋势")}</p>
      <div class="row" style="align-items:flex-end;height:110px;gap:6px">${months.map((m) => {
        const v = expOf(m);
        const label = lang === "en" ? m.slice(5) : `${+m.slice(5)}月`;
        return `<div style="flex:1;text-align:center"><div style="background:${m === m0 ? "var(--accent)" : "var(--chip)"};
          border-radius:6px 6px 0 0;height:${Math.max(4, (v / max) * 90)}px"></div>
          <span class="muted" style="font-size:10px">${label}</span></div>`;
      }).join("")}</div></div>
    <div class="card pad stack" style="gap:10px"><p class="muted" style="margin:0">${t("当月分类结构")}</p>
      ${byCat.length ? byCat.map((x) => `<div><div class="row" style="font-size:13px">
        <span>${x.c.icon} ${tn(x.c.name)}</span><b class="num" style="margin-left:auto">${fmt(x.v)}
        <span class="muted">${(x.v / cur * 100).toFixed(0)}%</span></b></div>
        <div class="bar"><i style="width:${(x.v / catMax) * 100}%"></i></div></div>`).join("")
      : `<span class="muted">${t("本月暂无支出")}</span>`}</div>
    <div class="card pad stack" style="gap:10px"><div class="row"><p class="muted" style="margin:0">${t("分类预算")}</p>
      <a class="link" style="margin-left:auto;font-size:13px" onclick="go('budget')">${t("去设置")} ›</a></div>
      ${budgets.length ? budgets.map((b) => { const over = b.spent > b.limit, pct = Math.min(100, b.spent / b.limit * 100);
        return `<div><div class="row" style="font-size:13px"><span>${cat(b.cid).icon} ${tn(cat(b.cid).name)}
          ${over ? ` <span class="tag tag-red">${t("超支")}</span>` : ""}</span>
          <span class="num muted" style="margin-left:auto">${fmt(b.spent)} / ${fmt(b.limit)}</span></div>
          <div class="bar"><i class="${over ? "over" : ""}" style="width:${pct}%"></i></div></div>`; }).join("")
      : `<span class="muted">${t("还没设预算")}</span>`}</div></div>`;
}

/* ============ 预算设置 ============ */
function budgetView() {
  return `<div class="stack">
    ${hdr(t("预算设置"), "me")}
    <p class="muted" style="margin:0">${t("按分类设常设月度限额;清空即取消。超过 80% 预警,超支后首页提醒。")}</p>
    <div class="card list">${CATS.map((c) => `<div><span style="flex:1">${c.icon} ${tn(c.name)}</span>
      <input id="bg${c.id}" inputmode="decimal" placeholder="${t("不限")}" aria-label="${c.name}预算"
        value="${S.budgets[c.id] ? S.budgets[c.id] / 100 : ""}" style="width:110px;text-align:right">
      <span class="muted">${t("元/月")}</span></div>`).join("")}</div>
    <button class="btn" onclick="saveBudget()">${t("保存")}</button></div>`;
}
function saveBudget() {
  CATS.forEach((c) => { const v = document.getElementById("bg" + c.id).value.trim();
    const cents = Math.round(Number(v) * 100);
    if (v && cents > 0) S.budgets[c.id] = cents; else delete S.budgets[c.id]; });
  save(); toast(t("已保存")); go("analysis");
}

/* ============ 周期支出 ============ */
function detectCandidates() {
  const m0 = monthOf(today()), months = [m0, shiftMonth(m0, -1), shiftMonth(m0, -2)];
  const g = new Map();
  S.txs.filter((x) => x.type === "expense" && x.note && months.includes(monthOf(x.date))).forEach((x) => {
    const k = x.note + "|" + x.amountCents;
    const e = g.get(k) ?? { seen: new Set(), last: x };
    e.seen.add(monthOf(x.date)); if (x.date > e.last.date) e.last = x; g.set(k, e);
  });
  const names = new Set(S.recurring.map((r) => r.name));
  return [...g.values()].filter((e) => e.seen.size >= 3 && !names.has(e.last.note))
    .map((e) => e.last).sort((a, b) => b.amountCents - a.amountCents);
}
function toggleRecForm() { recFormOpen = !recFormOpen; render(); }
function recurringView() {
  const tday = today(), cands = detectCandidates();
  return `<div class="stack">
    ${hdr(t("周期支出"), "me", `<button class="btn btn-sm" onclick="toggleRecForm()">${recFormOpen ? t("收起") : t("+ 新增")}</button>`)}
    <p class="muted" style="margin:0">${t("登记订阅、房租等固定支出;到期前 7 天在首页提醒,「记一笔」自动入账并顺延。")}</p>
    ${recFormOpen ? `<div class="card pad stack" style="gap:10px">
      <input id="rcName" placeholder="${t("名称,如 房租 / 视频会员")}" aria-label="周期支出名称">
      <div class="row"><input id="rcAmt" inputmode="decimal" placeholder="${t("金额(元)")}" aria-label="周期支出金额" style="flex:1">
        <select id="rcCycle" aria-label="周期" style="width:110px"><option value="monthly">${t("每月")}</option><option value="yearly">${t("每年")}</option></select></div>
      <div class="row"><select id="rcCat" aria-label="分类" style="flex:1">${CATS.map((c) =>
        `<option value="${c.id}">${c.icon} ${tn(c.name)}</option>`).join("")}</select>
        <input id="rcDate" type="date" value="${daysFromNow(30)}" aria-label="下次日期" style="width:150px"></div>
      <button class="btn" onclick="saveRecurring()">${t("保存")}</button></div>` : ""}
    <div class="card list">${S.recurring.length ? S.recurring
      .slice().sort((a, b) => a.nextDate.localeCompare(b.nextDate)).map((r) => {
        const st = dueStatus(r.nextDate, tday);
        return `<div><span style="flex:1;min-width:0"><b style="font-size:14px">${tn(r.name)}
          ${st === "overdue" ? ` <span class="tag tag-red">${t("已到期")}</span>` : st === "upcoming" ? ` <span class="tag tag-amber">${t("即将到期")}</span>` : ""}</b>
          <span class="muted num" style="display:block">${fmt(r.amountCents)} · ${t(r.cycle === "yearly" ? "每年" : "每月")} · ${t("下次")} ${r.nextDate}</span></span>
          <button class="btn btn-sm" onclick="payRecurring(${r.id})">${t("记一笔")}</button>
          <button class="btn btn-sm btn-ghost" onclick="delRecurring(${r.id})">✕</button></div>`;
      }).join("") : `<div class="muted">${t("还没有登记周期支出")}</div>`}</div>
    ${cands.length ? `<p class="muted" style="margin:0">${t("从流水中发现的疑似周期支出(近 3 个月每月出现、同名同金额):")}</p>
      <div class="card list">${cands.map((c) => `<div><span style="flex:1"><b style="font-size:14px">${tn(c.note)}</b>
        <span class="muted num" style="display:block">${fmt(c.amountCents)} · ${t("上次")} ${c.date}</span></span>
        <button class="btn btn-sm btn-ghost" onclick="adoptCandidate(${c.id})">${t("+ 添加")}</button></div>`).join("")}</div>` : ""}
  </div>`;
}
function saveRecurring() {
  const name = document.getElementById("rcName").value.trim();
  const cents = Math.round(Number(document.getElementById("rcAmt").value) * 100);
  const d = document.getElementById("rcDate").value;
  if (!name) return toast(t("请填名称"));
  if (!(cents > 0)) return toast(t("请填金额"));
  if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) return toast(t("请选下次日期"));
  S.recurring.push({ id: S.nextRec++, name, amountCents: cents,
    catId: +document.getElementById("rcCat").value,
    cycle: document.getElementById("rcCycle").value, nextDate: d });
  recFormOpen = false; save(); render(); toast(t("已登记"));
}
function adoptCandidate(txId) {
  const c = S.txs.find((x) => x.id === txId); if (!c) return;
  S.recurring.push({ id: S.nextRec++, name: c.note, amountCents: c.amountCents, catId: c.catId,
    cycle: "monthly", nextDate: advanceDate(c.date, "monthly") });
  save(); render(); toast(t("已登记为周期支出"));
}
function payRecurring(id) {
  const r = S.recurring.find((x) => x.id === id);
  S.txs.push({ id: S.nextId++, type: "expense", amountCents: r.amountCents, catId: r.catId,
    date: today(), note: r.name, source: "manual" });
  r.nextDate = advanceDate(r.nextDate, r.cycle);
  save(); render(); toast(`${t("已入账,顺延到")} ${r.nextDate}`);
}
function delRecurring(id) {
  if (!confirm(t("删除这条周期支出?(不影响已记的流水)"))) return;
  S.recurring = S.recurring.filter((x) => x.id !== id); save(); render();
}
